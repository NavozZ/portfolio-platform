services:

  frontend:

    build:
      context: ./frontend

    ports:
      - "80:80"

    depends_on:
      - backend

    healthcheck:

      test:
        [
          "CMD",

          "wget",

          "--spider",

          "http://localhost"

        ]

      interval: 30s

      timeout: 10s

      retries: 3

  backend:

    build:
      context: ./backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    healthcheck:

      test:
        [
          "CMD",

          "wget",

          "--spider",

          "http://localhost:5000/health"

        ]

      interval: 30s

      timeout: 10s

      retries: 3
